services:
  server:
    build: .
    environment:
      COOLIFY_SERVICE_FQDN_SERVER: 'https://paperclip-test.xcellence.uk'
      DATABASE_URL: 'postgres://paperclip:paperclip_pass_123@db:5432/paperclip'
      PORT: 3100
      PAPERCLIP_PUBLIC_URL: 'https://paperclip-test.xcellence.uk'
      SERVE_UI: 'true'
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      HERMES_HOME: /paperclip/.hermes
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - 3100
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperclip-test-https.rule=Host(`paperclip-test.xcellence.uk`)
      - traefik.http.routers.paperclip-test-https.entryPoints=https
      - traefik.http.routers.paperclip-test-https.tls=true
      - traefik.http.routers.paperclip-test-https.tls.certresolver=letsencrypt
      - traefik.http.routers.paperclip-test-https.service=paperclip-test
      - traefik.http.services.paperclip-test.loadbalancer.server.port=3100
      - traefik.http.routers.paperclip-test-http.rule=Host(`paperclip-test.xcellence.uk`)
      - traefik.http.routers.paperclip-test-http.entryPoints=http
      - traefik.http.routers.paperclip-test-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
    networks:
      - coolify
  db:
    image: 'postgres:17-alpine'
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip_pass_123
      POSTGRES_DB: paperclip
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U paperclip -d paperclip'
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - 'paperclip-db-data:/var/lib/postgresql/data'
    restart: unless-stopped
networks:
  coolify:
    external: true
volumes:
  paperclip-db-data: null
